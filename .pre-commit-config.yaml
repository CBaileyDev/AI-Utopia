repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9.0
        # pass_filenames: false ensures mypy type-checks the whole package
        # (not just the files changed in a commit) — required for strict-mode
        # cross-module checks to catch breakages.
        # `files:` still gates whether the hook runs at all.
        pass_filenames: false
        args: [--config-file=pyproject.toml, src/aiutopia]
        files: ^src/aiutopia/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
